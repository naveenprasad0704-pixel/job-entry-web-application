<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login - Smart Job Portal</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #f3f5f9, #e9edf5);
        padding: 20px;
    }

    .wrapper {
        background: #fff;
        border-radius: 20px;
        padding: 30px 50px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.08);
        min-height: 90vh;
    }

    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .logo { font-weight: 700; font-size: 1.3rem; }

    .nav-links a {
        margin: 0 15px;
        text-decoration: none;
        color: #555;
    }

    .nav-links a:hover { color: #000; }

    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 70vh;
    }

    .login-box {
        background: #fff;
        padding: 40px;
        border-radius: 20px;
        width: 350px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        text-align: center;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 10px;
        border: 1px solid #ddd;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        background: #111;
        color: white;
        border-radius: 25px;
        cursor: pointer;
    }

    button:hover { background: #333; }

    .back {
        display: block;
        margin-top: 15px;
        color: #555;
        text-decoration: none;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">Quietly</div>
    <div class="nav-links">
      <a th:href="@{/}">Home</a>
      <a th:href="@{/jobs}">Find Jobs</a>
    </div>
  </div>

  <!-- LOGIN -->
  <div class="login-container">
    <div class="login-box">

      <h2>Login</h2>

      <!-- 🔥 REDIRECT TO UPLOAD -->
      <form action="/upload" method="get">

        <input type="email" placeholder="Enter email" required>
        <input type="password" placeholder="Enter password" required>

        <button type="submit">Login</button>

      </form>

      <a th:href="@{/}" class="back">← Back to Home</a>

    </div>
  </div>

</div>

</body>
</html>
