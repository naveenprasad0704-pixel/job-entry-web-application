<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Upload Resume - Smart Job Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f3f5f9, #e9edf5);
            padding: 20px;
        }

        /* WRAPPER */
        .wrapper {
            background: #fff;
            border-radius: 20px;
            padding: 30px 50px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            min-height: 90vh;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: 700; font-size: 1.3rem; }

        .nav-links a {
            margin: 0 15px;
            text-decoration: none;
            color: #555;
        }

        .nav-links a:hover { color: #000; }

        /* CENTER */
        .upload-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70vh;
        }

        /* CARD */
        .upload-box {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* FILE INPUT */
        input[type="file"] {
            margin: 20px 0;
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #111;
            color: white;
            border-radius: 25px;
            cursor: pointer;
        }

        button:hover { background: #333; }

        .back {
            display: block;
            margin-top: 15px;
            color: #555;
            text-decoration: none;
        }

        /* 🎉 SUCCESS MESSAGE */
        .success-box {
            animation: fadeIn 1s ease forwards;
        }

        .success-icon {
            font-size: 60px;
            color: #22c55e;
            animation: pop 0.6s ease;
        }

        .success-text {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pop {
            0% { transform: scale(0.5); }
            100% { transform: scale(1); }
        }

        /* 🎊 CONFETTI */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: red;
            top: -10px;
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }

    </style>
</head>

<body>

<div class="wrapper">

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">Quietly</div>

        <div class="nav-links">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/jobs}">Find Jobs</a>
        </div>
    </div>

    <!-- CENTER -->
    <div class="upload-container">

        <!-- 🎉 SHOW SUCCESS -->
        <div class="upload-box" th:if="${message}">

            <div class="success-box">
                <div class="success-icon">✅</div>
                <div class="success-text" th:text="${message}">
                    Thank you for uploading!
                </div>
                <p style="margin-top:10px; color:#777;">
                    Your resume has been successfully submitted 🚀
                </p>
            </div>

            <a th:href="@{/}" class="back">← Back to Home</a>

        </div>

        <!-- 📤 SHOW FORM -->
        <div class="upload-box" th:unless="${message}">

            <h2>Upload Your Resume 📄</h2>

            <form th:action="@{/upload}" method="post" enctype="multipart/form-data">
                <input type="file" name="file" required>
                <button type="submit">Upload Resume</button>
            </form>

            <a th:href="@{/}" class="back">← Back to Home</a>

        </div>

    </div>

</div>

<!-- 🎊 CONFETTI (only when success) -->
<div th:if="${message}">
    <div class="confetti" style="left:10%; background:#ff6a00;"></div>
    <div class="confetti" style="left:30%; background:#22c55e;"></div>
    <div class="confetti" style="left:50%; background:#3b82f6;"></div>
    <div class="confetti" style="left:70%; background:#facc15;"></div>
    <div class="confetti" style="left:90%; background:#ec4899;"></div>
</div>

</body>
</html>
